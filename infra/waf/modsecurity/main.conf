# Motor ModSecurity activo
SecRuleEngine On

# Inspección del cuerpo de peticiones
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072

# Respuestas (desactivado para rendimiento)
SecResponseBodyAccess Off

# Log de auditoría
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsecurity/audit.log
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial

# Incluir reglas base de ModSecurity
Include /etc/modsecurity.d/modsecurity.conf

# Incluir OWASP CRS (paths for owasp/modsecurity-crs:nginx-alpine)
Include /etc/modsecurity.d/owasp-crs/crs-setup.conf
Include /etc/modsecurity.d/owasp-crs/rules/*.conf

# ── Nivel de paranoia ──────────────────────────────────────
# Nivel 2: balance entre protección y falsos positivos
SecAction \
  "id:900000, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.paranoia_level=2"

# ── Excepciones para Concordia ─────────────────────────────
# Los mensajes de chat pueden contener caracteres especiales
# sin ser XSS — excluir el body de /channels/*/messages
# de la regla de XSS genérica
SecRule REQUEST_URI "@beginsWith /channels/" \
  "id:1001, \
   phase:1, \
   pass, \
   nolog, \
   ctl:ruleRemoveTargetById=941100;REQUEST_BODY"

# El endpoint de health check no requiere inspección
SecRule REQUEST_URI "@streq /health" \
  "id:1002, \
   phase:1, \
   allow, \
   nolog"
