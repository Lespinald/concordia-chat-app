load_module modules/ngx_http_modsecurity_module.so;

pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity/main.conf;

    # Set Connection: upgrade only when the client sent an Upgrade header
    # (WebSocket); otherwise use Connection: close to avoid misleading backends.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Brute-force protection: max 5 login attempts/min per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    log_format waf_log '$remote_addr - $time_local '
                       '"$request" $status '
                       '"$http_user_agent"';

    access_log /var/log/nginx/access.log waf_log;
    error_log  /var/log/nginx/error.log  warn;

    server {
        listen 8080;

        # WebSocket endpoint — long-lived connections need extended timeouts.
        # Default proxy_read_timeout is 60s; without this nginx silently drops
        # idle WebSocket connections and the client never receives broadcasts.
        location /ws {
            proxy_pass         http://gateway:8080;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass         http://gateway:8080;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # Stricter rate limit on authentication endpoint
        location /auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://gateway:8080;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
